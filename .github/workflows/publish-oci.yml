name: Publish Wasm OCI Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build gams-js.wasm
        run: |
          nix develop --command make build

      - name: Verify build artifact
        run: |
          test -f cmake-build-release/gams-js.wasm
          ls -lh cmake-build-release/gams-js.wasm

      - name: Compute OCI metadata
        id: meta
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/gams-js"
          VERSION="$(date -u +'%Y%m%d.%H%M')"
          REF="${IMAGE}:${VERSION}"
          PACKAGE="gams:js@1.0.0"
          CANONICAL_REF="ghcr.io/${OWNER}/gams/js:1.0.0"

          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "package=${PACKAGE}" >> "$GITHUB_OUTPUT"
          echo "canonical_ref=${CANONICAL_REF}" >> "$GITHUB_OUTPUT"

      - name: Install wkg
        run: |
          nix develop --command cargo install wkg

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io \
                -u "${{ github.actor }}" \
                --password-stdin

      - name: Push timestamped Wasm component to GHCR
        run: |
          nix develop --command \
            wkg oci push "${{ steps.meta.outputs.ref }}" cmake-build-release/gams-js.wasm

      - name: Push latest tag to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          nix develop --command \
            wkg oci push "${{ steps.meta.outputs.image }}:latest" cmake-build-release/gams-js.wasm

      - name: Publish canonical wkg package layout to GHCR
        run: |
          set -euo pipefail

          WKG_CONFIG="${WKG_CONFIG:-$HOME/.config/wasm-pkg/config.toml}"
          if [ -s "$WKG_CONFIG" ]; then
            if nix develop --command \
              wkg publish cmake-build-release/gams-js.wasm \
                --package "${{ steps.meta.outputs.package }}"; then
              exit 0
            fi

            echo "::warning::wkg publish failed; falling back to direct OCI push"
          fi

          nix develop --command \
            wkg oci push "${{ steps.meta.outputs.canonical_ref }}" cmake-build-release/gams-js.wasm

      - name: Deployment summary
        run: |
          {
            echo "## Published Wasm OCI artifact"
            echo ""
            echo "- Timestamped: \`${{ steps.meta.outputs.ref }}\`"
            echo "- Canonical wkg package: \`${{ steps.meta.outputs.canonical_ref }}\`"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "- Latest: \`${{ steps.meta.outputs.image }}:latest\`"
            fi
            echo ""
            echo "- Package: \`${{ steps.meta.outputs.package }}\`"
            echo "- Image: \`${{ steps.meta.outputs.image }}\`"
            echo "- Version: \`${{ steps.meta.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
